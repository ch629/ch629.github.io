name: github pages

on:
  push:
    branches:
      - main  # Set a branch to deploy
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: gh-pages
    env:
      GA_ID_FROM_VARS: ${{ vars.HUGO_SERVICES_GOOGLEANALYTICS_ID }}
      GA_ID_FROM_SECRETS: ${{ secrets.HUGO_SERVICES_GOOGLEANALYTICS_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          # extended: true

      - name: Build
        run: |
          export HUGO_SERVICES_GOOGLEANALYTICS_ID="${GA_ID_FROM_VARS:-$GA_ID_FROM_SECRETS}"

          if [ -z "$HUGO_SERVICES_GOOGLEANALYTICS_ID" ]; then
            echo "HUGO_SERVICES_GOOGLEANALYTICS_ID is empty."
            echo "Set it in Environment 'gh-pages' as either a Variable or Secret."
            exit 1
          fi

          hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
